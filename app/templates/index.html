<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RF Signal Classifier</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #0a0e1a;
            color: #c8d6e5;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }

        header {
            background: #0d1b2a;
            border-bottom: 1px solid #1e3a5f;
            padding: 16px 32px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        header h1 {
            color: #4fc3f7;
            font-size: 18px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        header span {
            color: #546e7a;
            font-size: 12px;
        }

        .container { padding: 24px 32px; }

        /* ── Submit form ── */
        .form-card {
            background: #0d1b2a;
            border: 1px solid #1e3a5f;
            border-radius: 4px;
            padding: 20px;
            margin-bottom: 28px;
        }

        .form-card h2 {
            color: #4fc3f7;
            font-size: 13px;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }

        .form-grid label {
            display: flex;
            flex-direction: column;
            gap: 4px;
            color: #78909c;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-grid input, .form-grid select {
            background: #0a0e1a;
            border: 1px solid #1e3a5f;
            border-radius: 3px;
            color: #c8d6e5;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            padding: 6px 8px;
        }

        .form-grid input:focus, .form-grid select:focus {
            outline: none;
            border-color: #4fc3f7;
        }

        .form-grid select option { background: #0d1b2a; }

        button {
            background: #1565c0;
            border: none;
            border-radius: 3px;
            color: #fff;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            letter-spacing: 1px;
            padding: 7px 16px;
            text-transform: uppercase;
        }

        button:hover { background: #1976d2; }

        button.danger {
            background: transparent;
            border: 1px solid #37474f;
            color: #546e7a;
            padding: 4px 10px;
        }

        button.danger:hover { border-color: #e53935; color: #e53935; }

        button.classify-btn {
            background: transparent;
            border: 1px solid #1565c0;
            color: #4fc3f7;
            padding: 4px 10px;
        }

        button.classify-btn:hover { background: #1565c0; }

        button.secondary {
            background: transparent;
            border: 1px solid #1e3a5f;
            color: #78909c;
        }

        button.secondary:hover { border-color: #4fc3f7; color: #4fc3f7; background: transparent; }

        .import-label {
            background: transparent;
            border: 1px solid #1e3a5f;
            border-radius: 3px;
            color: #78909c;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            letter-spacing: 1px;
            padding: 7px 16px;
            text-transform: uppercase;
        }

        .import-label:hover { border-color: #4fc3f7; color: #4fc3f7; }

        /* ── Signals table ── */
        .table-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .table-header h2 {
            color: #4fc3f7;
            font-size: 13px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .signal-count {
            color: #546e7a;
            font-size: 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            background: #0d1b2a;
            border-bottom: 1px solid #1e3a5f;
            color: #546e7a;
            font-size: 11px;
            letter-spacing: 1px;
            padding: 10px 12px;
            text-align: left;
            text-transform: uppercase;
        }

        tbody tr { border-bottom: 1px solid #111827; }
        tbody tr:hover { background: #0d1b2a; }

        tbody td {
            padding: 10px 12px;
            vertical-align: middle;
        }

        .badge {
            border-radius: 3px;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1px;
            padding: 3px 8px;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .badge.high    { background: #1b5e20; color: #69f0ae; }
        .badge.possible { background: #e65100; color: #ffcc02; }
        .badge.unknown  { background: #1c1c1c; color: #546e7a; border: 1px solid #37474f; }
        .badge.none     { background: #1c1c1c; color: #37474f; border: 1px solid #1e3a5f; }

        .actions { display: flex; gap: 6px; }

        #toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #1565c0;
            color: #fff;
            border-radius: 4px;
            padding: 10px 18px;
            font-size: 13px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        #toast.show { opacity: 1; }
    </style>
</head>
<body>

<header>
    <h1>RF Signal Classifier</h1>
    <span>// SIGINT Analysis Platform</span>
    <span id="version-tag" style="margin-left:auto;color:#1e3a5f;font-size:11px;letter-spacing:1px"></span>
</header>

<div class="container">

    <!-- Submit Signal Form -->
    <div class="form-card">
        <h2>Submit Signal</h2>
        <div class="form-grid">
            <label>Frequency (MHz)
                <input type="number" id="frequency_mhz" step="any" placeholder="1575.42">
            </label>
            <label>Bandwidth (MHz)
                <input type="number" id="bandwidth_mhz" step="any" placeholder="2.0">
            </label>
            <label>Signal Strength (dBm)
                <input type="number" id="signal_strength_dbm" step="any" placeholder="-128">
            </label>
            <label>Modulation
                <select id="modulation">
                    <option value="">-- Select --</option>
                    <option>AM</option>
                    <option>FM</option>
                    <option>WBFM</option>
                    <option>NBFM</option>
                    <option>BPSK</option>
                    <option>QPSK</option>
                    <option>PSK</option>
                    <option>DSB</option>
                    <option>OFDM</option>
                    <option>PULSE</option>
                    <option>CW</option>
                </select>
            </label>
            <label>Pulse Rate (pps) <em style="color:#37474f">optional</em>
                <input type="number" id="pulse_rate_pps" step="any" placeholder="—">
            </label>
            <label>Latitude
                <input type="number" id="latitude" step="any" placeholder="38.8977">
            </label>
            <label>Longitude
                <input type="number" id="longitude" step="any" placeholder="-77.0365">
            </label>
        </div>
        <button onclick="submitSignal()">Submit Signal</button>
    </div>

    <!-- Signals Table -->
    <div class="table-header">
        <h2>Collected Signals</h2>
        <div style="display:flex;align-items:center;gap:16px">
            <span class="signal-count" id="signal-count"></span>
            <button class="secondary" onclick="classifyAll()">Classify All</button>
            <button class="secondary" onclick="exportCSV()">Export CSV</button>
            <label class="import-label">
                Import CSV
                <input type="file" accept=".csv" style="display:none" onchange="importCSV(this)">
            </label>
            <button class="danger" onclick="clearAll()">Delete All</button>
        </div>
    </div>

    <table id="signals-table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Freq (MHz)</th>
                <th>BW (MHz)</th>
                <th>Strength (dBm)</th>
                <th>Modulation</th>
                <th>Pulse Rate (pps)</th>
                <th>Wavelength (m)</th>
                <th>Classification</th>
                <th>Confidence</th>
                <th>Timestamp</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="signals-body">
        </tbody>
    </table>

</div>

<div id="toast"></div>

<script>
    // ── Fetch and render all signals on page load ──
    async function loadSignals() {
        const res  = await fetch('/signals');
        const data = await res.json();
        const tbody = document.getElementById('signals-body');
        const count = document.getElementById('signal-count');

        count.textContent = `${data.length} signal${data.length !== 1 ? 's' : ''} collected`;
        tbody.innerHTML = '';

        if (data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="11" style="text-align:center;color:#37474f;padding:32px">No signals collected yet</td></tr>';
            return;
        }

        data.forEach(signal => {
            const tr = document.createElement('tr');
            tr.id = `row-${signal.id}`;
            tr.innerHTML = `
                <td>${signal.id}</td>
                <td>${signal.frequency_mhz}</td>
                <td>${signal.bandwidth_mhz}</td>
                <td>${signal.signal_strength_dbm}</td>
                <td>${signal.modulation}</td>
                <td>${signal.pulse_rate_pps ?? '—'}</td>
                <td>${signal.wavelength_m.toFixed(4)}</td>
                <td>${classificationBadge(signal.classification, signal.confidence_score)}</td>
                <td>${signal.confidence_score != null ? signal.confidence_score + '%' : '—'}</td>
                <td style="color:#546e7a;font-size:12px">${new Date(signal.timestamp).toLocaleString()}</td>
                <td>
                    <div class="actions">
                        <button class="classify-btn" onclick="classifySignal(${signal.id})">Classify</button>
                        <button class="danger" onclick="deleteSignal(${signal.id})">Delete</button>
                    </div>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    // ── Render a colored badge based on classification status ──
    function classificationBadge(classification, confidence) {
        if (!classification) return '<span class="badge none">Unclassified</span>';
        if (confidence >= 70) return `<span class="badge high">${classification}</span>`;
        if (confidence >= 40) return `<span class="badge possible">${classification}</span>`;
        return `<span class="badge unknown">${classification}</span>`;
    }

    // ── Submit a new signal from the form ──
    async function submitSignal() {
        const fields = ['frequency_mhz','bandwidth_mhz','signal_strength_dbm','modulation','latitude','longitude'];
        const body   = {};

        for (const f of fields) {
            const val = document.getElementById(f).value;
            if (!val) { showToast(`Missing field: ${f}`, true); return; }
            body[f] = isNaN(val) ? val : Number(val);
        }

        const pr = document.getElementById('pulse_rate_pps').value;
        if (pr) body['pulse_rate_pps'] = Number(pr);

        const res = await fetch('/signals', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
        });

        if (res.ok) {
            showToast('Signal submitted');
            // Clear form inputs
            ['frequency_mhz','bandwidth_mhz','signal_strength_dbm','pulse_rate_pps','latitude','longitude']
                .forEach(f => document.getElementById(f).value = '');
            document.getElementById('modulation').value = '';
            loadSignals();
        } else {
            const err = await res.json();
            showToast(`Error: ${err.error}`, true);
        }
    }

    // ── Run the classifier on a signal and refresh the row ──
    async function classifySignal(id) {
        const res = await fetch(`/signals/${id}/classify`, { method: 'POST' });
        if (res.ok) {
            showToast(`Signal ${id} classified`);
            loadSignals();
        } else {
            showToast('Classification failed', true);
        }
    }

    // ── Delete a signal and remove its row ──
    async function deleteSignal(id) {
        const res = await fetch(`/signals/${id}`, { method: 'DELETE' });
        if (res.ok) {
            showToast(`Signal ${id} deleted`);
            loadSignals();
        } else {
            showToast('Delete failed', true);
        }
    }

    // ── Brief notification toast ──
    function showToast(msg, error = false) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.style.background = error ? '#b71c1c' : '#1565c0';
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // ── Classify all unclassified signals ──
    async function classifyAll() {
        const res = await fetch('/signals/classify-all', { method: 'POST' });
        if (res.ok) {
            const data = await res.json();
            showToast(data.classified > 0 ? `Classified ${data.classified} signal${data.classified !== 1 ? 's' : ''}` : 'No unclassified signals');
            loadSignals();
        } else {
            showToast('Classify all failed', true);
        }
    }

    // ── Export CSV ──
    function exportCSV() {
        window.location.href = '/signals/export';
    }

    // ── Import CSV ──
    async function importCSV(input) {
        const file = input.files[0];
        if (!file) return;

        const formData = new FormData();
        formData.append('file', file);

        const res = await fetch('/signals/import', { method: 'POST', body: formData });
        const data = await res.json();

        if (res.ok) {
            showToast(`Imported ${data.imported} signal${data.imported !== 1 ? 's' : ''}${data.skipped ? `, skipped ${data.skipped}` : ''}`);
            loadSignals();
        } else {
            showToast(`Import failed: ${data.error}`, true);
        }

        input.value = '';
    }

    // ── Delete all signals ──
    async function clearAll() {
        const res  = await fetch('/signals');
        const data = await res.json();
        if (data.length === 0) { showToast('No signals to delete'); return; }
        const confirmed = confirm(`Are you sure you want to delete all ${data.length} signal${data.length !== 1 ? 's' : ''}? This cannot be undone.`);
        if (!confirmed) return;
        await Promise.all(data.map(s => fetch(`/signals/${s.id}`, { method: 'DELETE' })));
        showToast(`Deleted ${data.length} signal${data.length !== 1 ? 's' : ''}`);
        loadSignals();
    }

    // ── Fetch and display version in header ──
    fetch('/version')
        .then(r => r.json())
        .then(d => {
            document.getElementById('version-tag').textContent = `v${d.version}`;
        });

    // Load signals when the page first opens
    loadSignals();
</script>

</body>
</html>
