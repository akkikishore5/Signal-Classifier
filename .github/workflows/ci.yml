name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install test dependencies
        run: pip install -r tests/requirements-test.txt

      - name: Run unit tests
        run: pytest tests/ -v

  build-and-scan:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t hello-flask:${{ github.sha }} .

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: hello-flask:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL

      - name: Log in to Docker Hub
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push image to Docker Hub
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          docker tag hello-flask:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/hello-flask:${{ github.sha }}
          docker tag hello-flask:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/hello-flask:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/hello-flask:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/hello-flask:latest
